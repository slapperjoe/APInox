<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APInox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a12;
      overflow: hidden;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <img id="splash" src="/app-title-dark.jpg" alt="APInox" />
  <script>
    async function showWindow() {
      try {
        const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
        await getCurrentWebviewWindow().show();
      } catch (e) {
        console.error('Failed to show splashscreen window:', e);
      }
    }

    const img = document.getElementById('splash');
    if (img.complete && img.naturalWidth > 0) {
      showWindow();
    } else {
      img.addEventListener('load', showWindow);
      img.addEventListener('error', showWindow);
    }
  </script>
</body>
</html>
