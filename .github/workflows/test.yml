name: Tests

on:
  push:
    branches: [main, Tauri]
  pull_request:
    branches: [main, Tauri]

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Lint workflow files
        uses: rhysd/actionlint@v1.7.7

  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
