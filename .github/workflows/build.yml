name: Build Tauri App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Build iOS'
        type: boolean
        default: false
      build_android:
        description: 'Build Android'
        type: boolean
        default: false

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            artifact_name: macos-arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install dependencies (macOS only)
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd src-tauri/webview && npm ci

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apinox-${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apinox-${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apinox-${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: error

  build-arch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux/archlinux:latest

    steps:
      - name: Install git (required for checkout in Arch container)
        run: pacman -Sy --noconfirm git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system and install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            nodejs \
            npm \
            rust \
            webkit2gtk-4.1 \
            gtk3 \
            libsoup3 \
            openssl \
            patchelf \
            dpkg \
            rpm-tools

      - name: Install root Node.js dependencies
        run: npm ci

      - name: Install webview Node.js dependencies
        run: cd src-tauri/webview && npm ci

      - name: Pre-build steps
        run: |
          node scripts/version.js increment
          node scripts/version.js sync
          npm run build:packages

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package for Arch Linux
        run: |
          # makepkg cannot run as root; create a temporary build user
          useradd -m builder
          WORKDIR="$(pwd)"
          chown -R builder:builder "$WORKDIR"
          # Write a helper script so the workspace path is not interpolated
          # inside a shell string passed to su, avoiding potential quoting issues
          cat > /tmp/run-makepkg.sh << SCRIPT
          #!/bin/bash
          set -e
          cd "$WORKDIR"
          mkdir -p target/release/bundle/arch
          # --nodeps: dependencies already installed in the previous step
          # --nocheck: the PKGBUILD has no check() function
          PKGDEST="$WORKDIR/target/release/bundle/arch" makepkg -f --nodeps --nocheck --noconfirm
          SCRIPT
          chmod +x /tmp/run-makepkg.sh
          su -s /bin/bash builder /tmp/run-makepkg.sh
          node scripts/gen-arch-install.js

      - name: Upload Arch Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apinox-linux-arch
          path: |
            target/release/bundle/arch/*.pkg.tar.zst
            target/release/bundle/arch/install.sh
          if-no-files-found: error

  build-ios:
    if: github.event_name != 'workflow_dispatch' || inputs.build_ios == true
    runs-on: macos-latest
    permissions:
      contents: read
    #
    # This job has TWO build paths, selected by which secrets are configured:
    #
    # ┌─────────────────────────────────┬────────────────┬──────────────────────┐
    # │ Secrets set                     │ Build output   │ Where it runs        │
    # ├─────────────────────────────────┼────────────────┼──────────────────────┤
    # │ (none) or APPLE_TEAM_ID only    │ unsigned .ipa  │ Real device via      │
    # │                                 │ (sideloadable) │ AltStore/Sideloadly  │
    # │ APPLE_CERTIFICATE + all four    │ signed .ipa    │ Real device directly │
    # │   (paid Developer Program)      │                │                      │
    # └─────────────────────────────────┴────────────────┴──────────────────────┘
    #
    # ── Path 1: Unsigned real-device IPA (no secrets — default) ─────────────
    # Built for aarch64-apple-ios with code signing fully disabled via pbxproj
    # patches. After the build, xcodebuild -exportArchive is skipped entirely;
    # the .app bundle is zipped manually into an IPA sideloadable via:
    #   • AltStore   — https://altstore.io
    #   • Sideloadly — https://sideloadly.io
    # These tools re-sign the .ipa with your free personal certificate.
    # Sideloaded apps work for 7 days before needing a re-install.
    # No Apple secrets are required for this path.
    #
    # ── Path 2: Signed .ipa (APPLE_CERTIFICATE + all four — paid account) ───
    # Fully signed for real-device deployment. Requires a paid Apple Developer
    # Program membership ($99/yr) for the certificate and provisioning profile.
    #
    # ── Secret reference table ───────────────────────────────────────────────
    #
    # Secret                       What it is                  Where to get it
    # ─────────────────────────────────────────────────────────────────────────
    # APPLE_TEAM_ID                10-character alphanumeric    Xcode → Settings →
    #                              string identifying your      Accounts → team row
    #                              Apple Developer team.        (also at developer.apple.com
    #                                                           → Account → Membership)
    #
    # APPLE_CERTIFICATE            Base64-encoded .p12 file    Keychain Access → right-click
    #                              containing your Apple        your "Apple Distribution" or
    #                              Distribution or Developer    "iPhone Developer" cert →
    #                              signing certificate +        Export → save as .p12 → then:
    #                              private key.                 base64 -i cert.p12 | pbcopy
    #                              Requires paid Apple
    #                              Developer Program ($99/yr).
    #
    # APPLE_CERTIFICATE_PASSWORD   Passphrase chosen when       You set this when exporting
    #                              exporting the .p12 above.    the .p12 from Keychain Access.
    #
    # APPLE_PROVISIONING_PROFILE   Base64-encoded               developer.apple.com →
    #                              .mobileprovision file that   Certificates, Identifiers &
    #                              links your App ID, devices,  Profiles → Profiles → download
    #                              and certificate together.    the .mobileprovision → then:
    #                              Requires paid Apple          base64 -i profile.mobileprovision | pbcopy
    #                              Developer Program ($99/yr).
    #
    # (The `secrets` context is not accessible in `if:` conditions, so secrets
    #  are mapped to env vars and those are tested instead.)
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd src-tauri/webview && npm ci

      - name: Install request-editor dependencies
        run: cd packages/request-editor && npm install

      # ── Path 1: Unsigned real-device IPA (no APPLE_CERTIFICATE) ─────────────
      # `tauri ios build` is used (not bare `xcodebuild archive`) because the
      # Xcode "Build Rust Code" phase calls `tauri ios xcode-script`, which
      # connects via WebSocket to a Tauri orchestrator process to receive build
      # options.  That orchestrator — and the addr file it writes to
      # $TMPDIR/app.apinox.dev1-server-addr — only exist when `tauri ios build`
      # is the one driving the build.  Calling xcodebuild directly skips all
      # of that setup, causing xcode-script to panic with "failed to read
      # missing addr file".
      #
      # tauri ios build:
      #   1. builds the webview frontend (beforeBuildCommand)
      #   2. starts the WebSocket server + writes the addr file
      #   3. calls xcodebuild archive  → succeeds (CODE_SIGNING_ALLOWED=NO in pbxproj)
      #   4. calls xcodebuild -exportArchive → fails (no signing certs — expected)
      #
      # We allow that failure, locate the xcarchive Xcode left behind, and copy
      # it to $RUNNER_TEMP/apinox.xcarchive for the packaging step below.
      #
      # The "Build Rust Code" Xcode phase also runs in a sanitised subprocess
      # that does NOT inherit the PATH set by dtolnay/rust-toolchain, so cargo
      # must be sourced explicitly.  The shellScript in project.pbxproj already
      # contains the `. "$HOME/.cargo/env"` prefix (committed fix); the step
      # below is belt-and-suspenders in case Tauri tooling regenerates the file.
      - name: Patch Xcode Build Rust Code phase to source cargo PATH
        if: env.APPLE_CERTIFICATE == ''
        run: |
          PBXPROJ="src-tauri/gen/apple/apinox.xcodeproj/project.pbxproj"
          # Only patch if not already patched (idempotent)
          if ! grep -q '\.cargo/env' "$PBXPROJ"; then
            sed -i '' \
              "s|shellScript = \"npm run -- tauri ios xcode-script|shellScript = \"[ -f \\\"$HOME/.cargo/env\\\" ] \\&\\& . \\\"$HOME/.cargo/env\\\"; export PATH=\\\"$HOME/.cargo/bin:$PATH\\\"; npm run -- tauri ios xcode-script|g" \
              "$PBXPROJ"
            echo "Patched shellScript in project.pbxproj to source cargo env"
          else
            echo "project.pbxproj already contains cargo PATH sourcing — skipping patch"
          fi

      - name: Build unsigned iOS archive (real device — aarch64)
        if: env.APPLE_CERTIFICATE == ''
        env:
          RUST_MIN_STACK: 4294967296
        run: |
          source "$HOME/.cargo/env" || true
          export PATH="$HOME/.cargo/bin:$PATH"

          # tauri ios build is required (not bare xcodebuild) because the Xcode
          # "Build Rust Code" phase calls `tauri ios xcode-script`, which connects
          # via WebSocket to a Tauri orchestrator that only `tauri ios build` starts.
          # The archive step succeeds; exportArchive fails (no signing certs) —
          # that is expected, so we use `|| true` to continue past it.
          npx tauri ios build || true

          # Locate the xcarchive produced by the archive step.
          # cargo-mobile2 may store it in gen/apple or in the standard Xcode
          # archives directory; search both, most-recently-modified first.
          # Use `|| true` after the pipeline to guard against pipefail when a
          # search directory does not exist.
          XCARCHIVE=$(find \
            "src-tauri/gen/apple" \
            "$HOME/Library/Developer/Xcode/Archives" \
            -name "*.xcarchive" -maxdepth 8 2>/dev/null \
            | sort -r | head -1 || true)

          if [[ -z "$XCARCHIVE" ]]; then
            echo "ERROR: No xcarchive found — Rust/Xcode compilation may have failed."
            echo "Searching entire runner home for any xcarchive:"
            find /Users/runner -name "*.xcarchive" -maxdepth 20 2>/dev/null || true
            exit 1
          fi

          echo "Archive found: $XCARCHIVE"
          cp -r "$XCARCHIVE" "$RUNNER_TEMP/apinox.xcarchive"

      - name: Package unsigned IPA from build output
        if: env.APPLE_CERTIFICATE == ''
        run: |
          # Use the known xcarchive path from the build step.
          APP_PATH=$(find "$RUNNER_TEMP/apinox.xcarchive/Products/Applications" \
            -maxdepth 1 -name "*.app" 2>/dev/null | head -1)

          # Fallback: search the gen/apple tree in case the path differs.
          if [[ -z "$APP_PATH" ]]; then
            XCARCHIVE=$(find src-tauri/gen/apple -name "*.xcarchive" 2>/dev/null | head -1)
            if [[ -n "$XCARCHIVE" ]]; then
              APP_PATH=$(find "$XCARCHIVE/Products/Applications" -maxdepth 1 -name "*.app" 2>/dev/null | head -1)
            fi
          fi

          if [[ -z "$APP_PATH" ]]; then
            APP_PATH=$(find src-tauri/gen/apple/build -name "*.app" \
              -not -path "*Simulator*" 2>/dev/null | head -1)
          fi

          if [[ -z "$APP_PATH" ]]; then
            echo "ERROR: no .app found"
            find "$RUNNER_TEMP" -name "*.xcarchive" -maxdepth 3 || true
            find src-tauri/gen/apple -maxdepth 5 || true
            exit 1
          fi

          APP_NAME=$(basename "$APP_PATH" .app)
          PAYLOAD_TMP=$(mktemp -d)
          mkdir -p "$PAYLOAD_TMP/Payload"
          cp -r "$APP_PATH" "$PAYLOAD_TMP/Payload/"
          (cd "$PAYLOAD_TMP" && zip -qr "${APP_NAME}.ipa" Payload/)
          cp "$PAYLOAD_TMP/${APP_NAME}.ipa" "$GITHUB_WORKSPACE/apinox-unsigned.ipa"
          echo "Unsigned IPA ready: apinox-unsigned.ipa"

      - name: Upload unsigned IPA artifact
        if: env.APPLE_CERTIFICATE == ''
        uses: actions/upload-artifact@v4
        with:
          name: apinox-ios-unsigned
          path: apinox-unsigned.ipa
          if-no-files-found: warn

      # ── Path 2: Signed .ipa (APPLE_CERTIFICATE set — paid Developer Program) ─
      - name: Import Apple code signing certificate
        if: env.APPLE_CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        if: env.APPLE_PROVISIONING_PROFILE != ''
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/apinox.mobileprovision

      - name: Enable code signing in Xcode project for signed build
        if: env.APPLE_TEAM_ID != '' && env.APPLE_CERTIFICATE != '' && env.APPLE_PROVISIONING_PROFILE != ''
        run: |
          sed -i '' 's/CODE_SIGNING_ALLOWED = NO;/CODE_SIGNING_ALLOWED = YES;/g' \
            src-tauri/gen/apple/apinox.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = NO;/CODE_SIGNING_REQUIRED = YES;/g' \
            src-tauri/gen/apple/apinox.xcodeproj/project.pbxproj

      - name: Build iOS IPA
        if: env.APPLE_TEAM_ID != '' && env.APPLE_CERTIFICATE != '' && env.APPLE_PROVISIONING_PROFILE != ''
        run: npx tauri ios build
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          RUST_MIN_STACK: 4294967296

      - name: Upload iOS IPA artifact
        if: env.APPLE_TEAM_ID != '' && env.APPLE_CERTIFICATE != '' && env.APPLE_PROVISIONING_PROFILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: apinox-ios
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn

  build-android:
    if: github.event_name != 'workflow_dispatch' || inputs.build_android == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Android signing uses a key.properties file read by build.gradle.kts.
    # To enable signed release APKs, add these repository secrets:
    #   ANDROID_KEYSTORE            – base64-encoded .jks / .keystore file
    #   ANDROID_KEYSTORE_PASSWORD   – keystore store password
    #   ANDROID_KEY_ALIAS           – key alias inside the keystore
    #   ANDROID_KEY_PASSWORD        – key password
    # When absent the build falls back to a debug (unsigned) APK.
    # Map secrets to env vars so they can be checked in `if:` conditions.
    # (The `secrets` context is not accessible in `if:` expressions.)
    env:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd src-tauri/webview && npm ci

      - name: Install request-editor dependencies
        run: cd packages/request-editor && npm install

      - name: Write key.properties for signing
        if: env.ANDROID_KEYSTORE != ''
        run: |
          # Decode keystore to a temp file
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode \
            > "$RUNNER_TEMP/release.keystore"
          # build.gradle.kts reads rootProject.file("key.properties"),
          # which resolves to src-tauri/gen/android/key.properties
          cat > src-tauri/gen/android/key.properties << EOF
          storeFile=$RUNNER_TEMP/release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build Android APK — arm64 signed release
        if: env.ANDROID_KEYSTORE != ''
        run: npx tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}

      - name: Build Android APK — arm64 unsigned debug
        if: env.ANDROID_KEYSTORE == ''
        run: npx tauri android build --target aarch64 --debug
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apinox-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
