name: Build Tauri App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            artifact_name: macos-arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd src-tauri/webview && npm ci

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apinox-${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apinox-${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: apinox-${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: error

  build-arch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux/archlinux:latest

    steps:
      - name: Install git (required for checkout in Arch container)
        run: pacman -Sy --noconfirm git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system and install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            nodejs \
            npm \
            rust \
            webkit2gtk-4.1 \
            gtk3 \
            libsoup3 \
            openssl \
            patchelf \
            dpkg \
            rpm-tools

      - name: Install root Node.js dependencies
        run: npm ci

      - name: Install webview Node.js dependencies
        run: cd src-tauri/webview && npm ci

      - name: Pre-build steps
        run: |
          node scripts/increment-build.js
          node scripts/sync-version.js
          npm run build:packages

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package for Arch Linux
        run: |
          # makepkg cannot run as root; create a temporary build user
          useradd -m builder
          WORKDIR="$(pwd)"
          chown -R builder:builder "$WORKDIR"
          # Write a helper script so the workspace path is not interpolated
          # inside a shell string passed to su, avoiding potential quoting issues
          cat > /tmp/run-makepkg.sh << SCRIPT
          #!/bin/bash
          set -e
          cd "$WORKDIR"
          mkdir -p target/release/bundle/arch
          # --nodeps: dependencies already installed in the previous step
          # --nocheck: the PKGBUILD has no check() function
          PKGDEST="$WORKDIR/target/release/bundle/arch" makepkg -f --nodeps --nocheck --noconfirm
          SCRIPT
          chmod +x /tmp/run-makepkg.sh
          su -s /bin/bash builder /tmp/run-makepkg.sh
          node scripts/gen-arch-install.js

      - name: Upload Arch Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apinox-linux-arch
          path: |
            target/release/bundle/arch/*.pkg.tar.zst
            target/release/bundle/arch/install.sh
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    permissions:
      contents: read
    #
    # This job has THREE build paths, selected by which secrets are configured:
    #
    # ┌─────────────────────────────────┬────────────────┬──────────────────────┐
    # │ Secrets set                     │ Build output   │ Where it runs        │
    # ├─────────────────────────────────┼────────────────┼──────────────────────┤
    # │ (none)                          │ .app bundle    │ iOS Simulator only   │
    # │ APPLE_TEAM_ID only              │ unsigned .ipa  │ Real device via      │
    # │   (free Xcode / personal team)  │ (sideloadable) │ AltStore/Sideloadly  │
    # │ APPLE_CERTIFICATE + all four    │ signed .ipa    │ Real device directly │
    # │   (paid Developer Program)      │                │                      │
    # └─────────────────────────────────┴────────────────┴──────────────────────┘
    #
    # ── Path 1: Simulator .app (no secrets) ──────────────────────────────────
    # Built for aarch64-apple-ios-sim with code signing fully disabled.
    # Drag the .app bundle into Xcode Simulator — no Apple account needed.
    #
    # ── Path 2: Sideload .ipa (APPLE_TEAM_ID only — free account) ───────────
    # Built for aarch64-apple-ios (real device ARM64) with signing disabled.
    # Packaged into an .ipa (a zip of Payload/AppName.app).
    #
    # You can then install it on your iPhone using a FREE Apple ID via:
    #   • AltStore   — https://altstore.io
    #   • Sideloadly — https://sideloadly.io
    # These tools re-sign the .ipa with your free personal certificate.
    # Sideloaded apps work for 7 days before needing a re-install.
    #
    # ── Path 3: Signed .ipa (APPLE_CERTIFICATE + all four — paid account) ───
    # Fully signed for real-device deployment. Requires a paid Apple Developer
    # Program membership ($99/yr) for the certificate and provisioning profile.
    #
    # ── FAQ: "I only have a Team ID from Xcode — can I test on a real phone?"─
    # YES — set just APPLE_TEAM_ID.  The workflow will produce a sideloadable
    # .ipa (Path 2 above) that you can install with AltStore or Sideloadly.
    # Do NOT set APPLE_CERTIFICATE unless you also have the matching .p12 file
    # from a paid Developer Program; mixing them will break the signed build.
    #
    # ── Secret reference table ───────────────────────────────────────────────
    #
    # Secret                       What it is                  Where to get it
    # ─────────────────────────────────────────────────────────────────────────
    # APPLE_TEAM_ID                10-character alphanumeric    Xcode → Settings →
    #                              string identifying your      Accounts → team row
    #                              Apple Developer team.        (also at developer.apple.com
    #                              Free accounts have one too.  → Account → Membership)
    #
    # APPLE_CERTIFICATE            Base64-encoded .p12 file    Keychain Access → right-click
    #                              containing your Apple        your "Apple Distribution" or
    #                              Distribution or Developer    "iPhone Developer" cert →
    #                              signing certificate +        Export → save as .p12 → then:
    #                              private key.                 base64 -i cert.p12 | pbcopy
    #                              Requires paid Apple
    #                              Developer Program ($99/yr).
    #
    # APPLE_CERTIFICATE_PASSWORD   Passphrase chosen when       You set this when exporting
    #                              exporting the .p12 above.    the .p12 from Keychain Access.
    #
    # APPLE_PROVISIONING_PROFILE   Base64-encoded               developer.apple.com →
    #                              .mobileprovision file that   Certificates, Identifiers &
    #                              links your App ID, devices,  Profiles → Profiles → download
    #                              and certificate together.    the .mobileprovision → then:
    #                              Requires paid Apple          base64 -i profile.mobileprovision | pbcopy
    #                              Developer Program ($99/yr).
    #
    # (The `secrets` context is not accessible in `if:` conditions, so secrets
    #  are mapped to env vars and those are tested instead.)
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd src-tauri/webview && npm ci

      - name: Install request-editor dependencies
        run: cd packages/request-editor && npm install

      # ── Path 1: Simulator .app (no secrets set) ─────────────────────────────
      - name: Build unsigned iOS (simulator)
        if: env.APPLE_CERTIFICATE == '' && env.APPLE_TEAM_ID == ''
        run: npx tauri ios build --target aarch64-apple-ios-sim -- CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Upload unsigned iOS simulator artifact
        if: env.APPLE_CERTIFICATE == '' && env.APPLE_TEAM_ID == ''
        uses: actions/upload-artifact@v4
        with:
          name: apinox-ios-simulator
          path: src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn

      # ── Path 2: Sideload .ipa (APPLE_TEAM_ID set, no certificate) ───────────
      # Builds for real-device ARM64 without signing so the artifact can be
      # re-signed and installed via AltStore or Sideloadly using a free Apple ID.
      - name: Build unsigned iOS (device — sideload)
        if: env.APPLE_CERTIFICATE == '' && env.APPLE_TEAM_ID != ''
        run: npx tauri ios build --target aarch64-apple-ios -- CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY=""
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package sideload IPA
        if: env.APPLE_CERTIFICATE == '' && env.APPLE_TEAM_ID != ''
        run: |
          APP_PATH=$(find src-tauri/gen/apple/build -name "*.app" -path "*iphoneos*" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/apple/build -name "*.app" | grep -v sim | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "Error: no .app bundle found for device target" >&2
            exit 1
          fi
          echo "Packaging: $APP_PATH"
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp && zip -qr "$GITHUB_WORKSPACE/apinox-sideload.ipa" Payload/

      - name: Upload sideload IPA artifact
        if: env.APPLE_CERTIFICATE == '' && env.APPLE_TEAM_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: apinox-ios-sideload
          path: apinox-sideload.ipa
          if-no-files-found: warn

      # ── Path 3: Signed .ipa (APPLE_CERTIFICATE set — paid Developer Program) ─
      - name: Import Apple code signing certificate
        if: env.APPLE_CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        if: env.APPLE_PROVISIONING_PROFILE != ''
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/apinox.mobileprovision

      - name: Build signed iOS IPA (device)
        if: env.APPLE_CERTIFICATE != ''
        run: npx tauri ios build
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload signed iOS IPA artifact
        if: env.APPLE_CERTIFICATE != ''
        uses: actions/upload-artifact@v4
        with:
          name: apinox-ios
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Android builds produce an unsigned APK by default.
    # To enable signed release APKs, add these repository secrets:
    #   ANDROID_KEYSTORE            – base64-encoded .jks / .keystore file
    #   ANDROID_KEYSTORE_PASSWORD   – keystore store password
    #   ANDROID_KEY_ALIAS           – key alias inside the keystore
    #   ANDROID_KEY_PASSWORD        – key password
    # Signing steps are skipped gracefully when those secrets are absent.
    # Map secrets to env vars so they can be checked in `if:` conditions.
    # (The `secrets` context is not accessible in `if:` expressions.)
    env:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd src-tauri/webview && npm ci

      - name: Install request-editor dependencies
        run: cd packages/request-editor && npm install

      - name: Decode signing keystore
        if: env.ANDROID_KEYSTORE != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode \
            > "$RUNNER_TEMP/release.keystore"

      - name: Build Android APK (signed release)
        if: env.ANDROID_KEYSTORE != ''
        run: npx tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
          TAURI_ANDROID_SIGNING_KEY_STORE: ${{ runner.temp }}/release.keystore
          TAURI_ANDROID_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android APK (unsigned debug)
        if: env.ANDROID_KEYSTORE == ''
        run: npx tauri android build --debug
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apinox-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

  release:
    needs: [build, build-arch, build-ios, build-android]
    # build-ios and build-android list in needs so any available mobile artifacts
    # are collected before the release step runs. Neither blocks the release —
    # the condition below only requires the desktop jobs to succeed.
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build.result == 'success' &&
      needs.build-arch.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.pkg.tar.zst
            artifacts/**/*.ipa
            artifacts/**/*.apk
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
